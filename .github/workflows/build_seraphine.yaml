name: Build Seraphine

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint with ruff
        run: |
          ruff check app/ tests/ --output-format=github
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -v

  build-seraphine:
    needs: lint-and-test
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          cache: 'pip'
      - name: Pack Seraphine
        run: |
          pip install -r requirements.txt
          pip install pyinstaller==5.13
          .\make.ps1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Seraphine
          path: .\Seraphine.7z

  release:
    needs: build-seraphine
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup environment variables
      run: |
        export VERSION_CHANGED_COMMIT_HASH=$(git blame app/common/config.py --root -l | grep -Po "([\w]+) (?=\(.*\) VERSION = )")
        export HEAD_COMMIT_HASH=$(git log -1 --format='%H')
        export UPDATED=$(python -c "import os; UPDATED = 'true' if os.environ['HEAD_COMMIT_HASH'].strip() == os.environ['VERSION_CHANGED_COMMIT_HASH'].strip() else 'false'; print(UPDATED)")
        export VERSION=$(cat app/common/config.py | grep -Po "(?<=VERSION = \")(.*[^\"])")
        echo "VERSION=v$VERSION" >> $GITHUB_ENV
        echo "UPDATED=$UPDATED" >> $GITHUB_ENV
    - name: Download artifact
      uses: actions/download-artifact@v4
      if: env.UPDATED == 'true'
      with:
        name: Seraphine
        path: ./
    - name: Push to release
      uses: ncipollo/release-action@v1
      if: env.UPDATED == 'true'
      with:
        name: ${{ env.VERSION }}
        tag: ${{ env.VERSION }}
        token: ${{ secrets.GITHUB_TOKEN }}
        replacesArtifacts: false
        artifacts: Seraphine.7z
